<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LLA — Vertientes Tuiteras</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #2BA8D4;
      --purple:  #8B4FC8;
      --pink:    #D4197A;
      --yellow:  #F0C020;
      --lavender:#9E7AC8;
      --red:     #D43028;
      --dark:    #111318;
      --mid:     #1C1F28;
      --light:   #E8ECF2;
      --font-title: 'Bebas Neue', sans-serif;
      --font-body:  'DM Sans', sans-serif;
    }

    html { font-family: var(--font-body); background: var(--dark); color: var(--light); }

    /* ── HEADER ── */
    .site-header {
      text-align: center;
      padding: 52px 24px 36px;
      background: var(--mid);
      border-bottom: 3px solid #ffffff18;
      position: relative;
      overflow: hidden;
    }
    .site-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 120% at 50% 0%, #8B4FC622 0%, transparent 70%);
      pointer-events: none;
    }
    .site-header .eyebrow {
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #ffffff55;
      margin-bottom: 10px;
    }
    .site-header h1 {
      font-family: var(--font-title);
      font-size: clamp(2.4rem, 5.5vw, 5rem);
      letter-spacing: .08em;
      line-height: 1;
      background: linear-gradient(135deg, #fff 30%, #c8a0ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .site-header .subtitle {
      margin-top: 12px;
      font-size: 13px;
      color: #ffffff44;
      letter-spacing: .06em;
    }

    /* ── WRAPPER ── */
    .org-wrapper {
      max-width: 1340px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    .section-label {
      font-family: var(--font-title);
      font-size: 11px;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: #ffffff55;
      text-align: center;
      margin-bottom: 20px;
    }

    /* ══════════════════════════════════════
       TREE HIERARCHY LAYOUT
    ══════════════════════════════════════ */

    .tree-root {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      padding-bottom: 28px;
      margin-bottom: 0;
    }
    .tree-root::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 28px;
      background: linear-gradient(to bottom, #8B4FC8cc, #8B4FC855);
    }

    .root-avatar {
      width: 96px; height: 96px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-title);
      font-size: 34px; color: #fff;
      margin-bottom: 12px;
      border: 3px solid #8B4FC8;
      box-shadow: 0 0 0 6px #8B4FC820, 0 0 40px #8B4FC855;
      overflow: hidden; flex-shrink: 0;
      transition: transform .2s;
    }
    .root-avatar:hover { transform: scale(1.05); }
    .root-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .root-name {
      font-family: var(--font-title);
      font-size: 18px; letter-spacing: .2em;
      color: #fff;
      text-shadow: 0 0 20px #8B4FC888;
    }

    .top-section {
      display: grid;
      grid-template-columns: 3fr 1fr;
      gap: 20px;
      align-items: start;
      margin-bottom: 8px;
    }

    .top-main-grid {
      display: grid;
      gap: 20px;
      align-items: start;
      position: relative;
    }
    /* horizontal connector bar — gradient set dynamically by JS */
    .top-main-grid::before {
      content: '';
      position: absolute;
      top: 0;
      left: calc(100% / 6);
      right: calc(100% / 6);
      height: 2px;
      z-index: 1;
    }

    .panel-col-wrap {
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    .col-drop {
      width: 2px;
      height: 24px;
      margin: 0 auto;
      flex-shrink: 0;
    }
    /* drop line colours for every panel colour */
    .col-drop--blue     { background: linear-gradient(to bottom, #2BA8D8aa, transparent); }
    .col-drop--purple   { background: linear-gradient(to bottom, #8B4FC8cc, transparent); }
    .col-drop--pink     { background: linear-gradient(to bottom, #D4197Aaa, transparent); }
    .col-drop--yellow   { background: linear-gradient(to bottom, #F0C020aa, transparent); }
    .col-drop--lavender { background: linear-gradient(to bottom, #9E7AC8aa, transparent); }
    .col-drop--red      { background: linear-gradient(to bottom, #D43028aa, transparent); }
    .col-drop--gray     { background: linear-gradient(to bottom, #8890A8aa, transparent); }

    /* ── PANEL ── */
    .panel {
      border-radius: 18px;
      padding: 22px 18px;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel--blue    { background: #1D5F80; border: 2px solid #2BA8D4; }
    .panel--purple  { background: #4A2878; border: 2px solid #8B4FC8; }
    .panel--pink    { background: #78104A; border: 2px solid #D4197A; }
    .panel--yellow  { background: #7A6010; border: 2px solid #F0C020; }
    .panel--lavender{ background: #38265C; border: 2px solid #9E7AC8; }
    .panel--red     { background: #6E1814; border: 2px solid #D43028; }
    .panel--gray    { background: #2A2E38; border: 2px solid #8890A8; }

    /* ── LEADER ── */
    .leader {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 18px;
    }
    .leader-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-title);
      font-size: 26px; color: #fff;
      margin-bottom: 10px;
      border: 3px solid #ffffff44;
      box-shadow: 0 0 24px #00000055;
      overflow: hidden; flex-shrink: 0;
      transition: transform .2s;
    }
    .leader-avatar:hover { transform: scale(1.07); }
    .leader-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .leader-name {
      font-family: var(--font-title);
      font-size: 14px; letter-spacing: .18em;
      text-align: center; color: #ffffffcc;
    }

    /* ── PANEL TITLE ── */
    .panel-title {
      font-family: var(--font-title);
      font-size: 13px; letter-spacing: .22em;
      text-transform: uppercase; text-align: center;
      padding: 6px 14px; border-radius: 100px;
      background: #00000030; border: 1px solid #ffffff22;
      margin-bottom: 18px; color: #ffffffcc;
    }

    /* ── MEMBER GRID ── */
    .member-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 14px 10px;
    }
    .member {
      display: flex; flex-direction: column;
      align-items: center; gap: 7px;
      cursor: default;
      transition: transform .15s;
    }
    .member:hover { transform: translateY(-3px); }
    .member-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-title);
      font-size: 18px; color: #fff;
      border: 2px solid #ffffff30;
      box-shadow: 0 4px 12px #00000040;
      flex-shrink: 0; overflow: hidden;
    }
    .member-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .member-name {
      font-size: 10px; font-weight: 600;
      text-align: center; line-height: 1.3;
      text-transform: uppercase; letter-spacing: .04em;
      color: #ffffffbb;
    }

    /* ── SUB-PANEL ── */
    .sub-panel {
      border-radius: 12px; padding: 16px 14px;
      margin-top: 16px;
    }
    .sub-panel--yellow   { background: #5A4508; border: 2px solid #F0C020; }
    .sub-panel--blue     { background: #154060; border: 2px solid #2BA8D4; }
    .sub-panel--purple   { background: #2A1848; border: 2px solid #8B4FC8; }
    .sub-panel--pink     { background: #580830; border: 2px solid #D4197A; }
    .sub-panel--lavender { background: #281848; border: 2px solid #9E7AC8; }
    .sub-panel--red      { background: #4E100C; border: 2px solid #D43028; }
    .sub-panel--gray     { background: #1E2230; border: 2px solid #8890A8; }
    .sub-panel .panel-title { font-size: 11px; margin-bottom: 14px; }

    /* sub-panel leader */
    .sub-leader {
      display: flex; flex-direction: column;
      align-items: center; margin-bottom: 14px;
    }
    .sub-leader-avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-title);
      font-size: 20px; color: #fff;
      margin-bottom: 7px;
      border: 2px solid #ffffff55;
      box-shadow: 0 0 16px #00000044;
      overflow: hidden; flex-shrink: 0;
      transition: transform .2s;
    }
    .sub-leader-avatar:hover { transform: scale(1.07); }
    .sub-leader-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .sub-leader-name {
      font-family: var(--font-title);
      font-size: 11px; letter-spacing: .16em;
      text-align: center; color: #ffffffcc;
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex; align-items: center;
      gap: 16px; margin: 44px 0 28px;
    }
    .divider hr { flex: 1; border: none; border-top: 2px solid #ffffff14; }
    .divider-label {
      font-size: 10px; letter-spacing: .28em;
      text-transform: uppercase; color: #ffffff30; white-space: nowrap;
    }

    /* ── BOTTOM SECTION ── */
    .bottom-grid {
      display: grid;
      column-gap: 20px;
      row-gap: 0;
      align-items: start;
    }
    .bottom-grid .panel { grid-row: 1; }

    .bridge-strip {
      grid-row: 2;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 14px;
    }

    .bridge-member {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      position: relative;
    }
    .bridge-member::before,
    .bridge-member::after {
      content: '';
      position: absolute;
      top: 26px;
      width: 60px; height: 2px;
      opacity: .5;
    }
    .bridge-member::before {
      right: calc(100% - 2px);
      background: linear-gradient(to left, currentColor, transparent);
    }
    .bridge-member::after {
      left: calc(100% - 2px);
      background: linear-gradient(to right, currentColor, transparent);
    }

    .bridge-avatar {
      width: 58px; height: 58px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-title);
      font-size: 18px; color: #fff;
      box-shadow: 0 0 0 3px #111318, 0 0 0 5px #ffffff44, 0 6px 18px #00000060;
      overflow: hidden; flex-shrink: 0;
    }
    .bridge-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .bridge-label {
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: #ffffff66; text-align: center;
    }
    .bridge-name {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .04em;
      color: #ffffffcc; text-align: center;
      line-height: 1.3;
    }

    /* ── AVATAR COLOUR CLASSES ── */
    .av-blue     { background: linear-gradient(135deg, #2BA8D4, #1A6E8C); }
    .av-purple   { background: linear-gradient(135deg, #8B4FC8, #5A2888); }
    .av-pink     { background: linear-gradient(135deg, #D4197A, #8C1050); }
    .av-yellow   { background: linear-gradient(135deg, #F0C020, #A07C10); }
    .av-lavender { background: linear-gradient(135deg, #9E7AC8, #6050A0); }
    .av-red      { background: linear-gradient(135deg, #D43028, #8C1C18); }
    .av-gray     { background: linear-gradient(135deg, #6A7088, #3A3E50); }

    /* right column */
    .right-column { display: flex; flex-direction: column; gap: 20px; }

    /* ── STATUS ── */
    .tip { text-align: center; font-size: 11px; color: #ffffff22; letter-spacing: .06em; margin-top: 48px; }
    #loading { text-align: center; padding: 80px 20px; font-size: 14px; color: #ffffff44; letter-spacing: .1em; }
    #error-msg {
      display: none; text-align: center;
      padding: 20px 24px; font-size: 13px; color: #F0C020;
      background: #7A601022; border: 1px solid #F0C02044;
      border-radius: 12px; margin: 0 auto 28px;
      max-width: 680px; line-height: 1.8;
    }
    #error-msg code { background: #00000040; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 12px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1000px) {
      .top-section { grid-template-columns: 1fr; }
      .top-main-grid { grid-template-columns: 1fr !important; }
      .bottom-grid { grid-template-columns: 1fr !important; }
      .bridge-strip { grid-column: 1 !important; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <p class="eyebrow">La Libertad Avanza</p>
  <h1>Facciones LLA</h1>
  <p class="subtitle">Mapa de facciones del ecosistema libertario en redes sociales</p>
</header>

<div class="org-wrapper">
  <div id="loading">Cargando iconos.csv…</div>
  <div id="error-msg"></div>
  <div id="chart" style="display:none"></div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════
//  PALETA DE COLORES
//  Cada clave coincide con la columna "color" del CSV.
// ════════════════════════════════════════════════════════════════════════
const COLORS = {
  blue:    { panel:'panel--blue',    av:'av-blue',    drop:'col-drop--blue',    hex:['#2BA8D4','#1A6E8C'] },
  purple:  { panel:'panel--purple',  av:'av-purple',  drop:'col-drop--purple',  hex:['#8B4FC8','#5A2888'] },
  pink:    { panel:'panel--pink',    av:'av-pink',    drop:'col-drop--pink',    hex:['#D4197A','#8C1050'] },
  yellow:  { panel:'panel--yellow',  av:'av-yellow',  drop:'col-drop--yellow',  hex:['#F0C020','#A07C10'] },
  lavender:{ panel:'panel--lavender',av:'av-lavender',drop:'col-drop--lavender',hex:['#9E7AC8','#7050A0'] },
  red:     { panel:'panel--red',     av:'av-red',     drop:'col-drop--red',     hex:['#D43028','#A82018'] },
  gray:    { panel:'panel--gray',    av:'av-gray',    drop:'col-drop--gray',    hex:['#8890A8','#3A3E50'] },
};

// ════════════════════════════════════════════════════════════════════════
//  PARSER CSV  (soporta campos entre comillas con comas internas)
// ════════════════════════════════════════════════════════════════════════
function splitCSVLine(line, sep) {
  const fields = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === sep && !inQ) {
      fields.push(cur.trim());
      cur = '';
    } else {
      cur += ch;
    }
  }
  fields.push(cur.trim());
  return fields;
}

function parseCSVRows(text) {
  const lines = text.trim().split(/\r?\n/).filter(Boolean);
  if (lines.length < 2) return [];
  const sep     = lines[0].includes(';') ? ';' : ',';
  const headers = splitCSVLine(lines[0], sep).map(h => h.toLowerCase().replace(/^["']|["']$/g,''));
  return lines.slice(1).map(line => {
    const cols = splitCSVLine(line, sep);
    const obj  = {};
    headers.forEach((h, i) => { obj[h] = cols[i] !== undefined ? cols[i] : ''; });
    return obj;
  }).filter(r => r.id);
}

// ════════════════════════════════════════════════════════════════════════
//  BUILD ORG  —  construye la estructura desde las filas del CSV
// ════════════════════════════════════════════════════════════════════════
function buildORG(rows) {
  // Si no hay columna "tipo" → CSV antiguo, no se puede construir ORG
  if (!rows.length || !('tipo' in rows[0])) return null;

  const panelDefs  = {};   // id → definición de panel
  const personaRows = [];

  // 1) Separar paneles y personas
  for (const r of rows) {
    if (r.tipo === 'panel') {
      panelDefs[r.id] = {
        id: r.id, titulo: r.nombre,
        seccion: r.seccion, color: r.color || 'purple',
        panel_padre: r.panel_padre || '',
        orden: parseInt(r.orden) || 99,
        leader: null, direct: [], subs: [], bridgeAfter: [],
      };
    } else {
      personaRows.push(r);
    }
  }

  let rootInfo = null;

  // 2) Asignar personas a paneles
  for (const p of personaRows) {
    if (!p.id) continue;
    const nombre   = p.nombre || p.id;
    const fallback = nombre.replace(/\s+/g, '').substring(0, 2).toUpperCase();

    // Persona bridge (conecta dos paneles)
    if (p.es_bridge === 'si' && p.bridge_entre) {
      const [leftId, rightId] = p.bridge_entre.split(',').map(s => s.trim());
      const lc = COLORS[panelDefs[leftId]?.color]  || COLORS.purple;
      const rc = COLORS[panelDefs[rightId]?.color] || COLORS.purple;
      const gradStyle = `background:linear-gradient(90deg,${lc.hex[1]} 48%,#111318 50%,${rc.hex[1]} 52%)`;

      const bm = { id: p.id, fallback, colorClass: '', style: gradStyle };
      const attachTo = panelDefs[leftId] || panelDefs[rightId];
      if (attachTo) attachTo.bridgeAfter.push(bm);
      continue;
    }

    const panel = p.panel ? panelDefs[p.panel] : null;
    if (!panel) continue;

    const colorKey = p.color || panel.color;
    const avColor  = COLORS[colorKey]?.av || 'av-purple';
    const member   = { id: p.id, fallback, color: avColor };

    if (p.es_root === 'si') rootInfo = { member, panelId: p.panel };

    if (p.es_lider === 'si') {
      panel.leader = member;
    } else {
      panel.direct.push(member);
    }
  }

  // 3) Construir jerarquía de sub-paneles
  for (const [, panel] of Object.entries(panelDefs)) {
    if (panel.panel_padre && panelDefs[panel.panel_padre]) {
      const color = panel.color || 'yellow';
      panelDefs[panel.panel_padre].subs.push({
        title: panel.titulo, color,
        leader: panel.leader,
        members: [...panel.direct],
        orden: panel.orden,
      });
    }
  }
  for (const p of Object.values(panelDefs)) {
    p.subs.sort((a, b) => a.orden - b.orden);
  }

  // 4) Separar por sección
  const sorted = sec => Object.values(panelDefs)
    .filter(p => p.seccion === sec && !p.panel_padre)
    .sort((a, b) => a.orden - b.orden);

  const topPanels    = sorted('top');
  const rightPanels  = sorted('right');
  const bottomPanels = sorted('bottom');

  const rootIdx = rootInfo
    ? Math.max(0, topPanels.findIndex(p => p.id === rootInfo.panelId))
    : Math.floor(topPanels.length / 2);

  // Gradiente del conector horizontal superior
  const topGradient = topPanels.length
    ? topPanels.map((p, i) => {
        const c   = COLORS[p.color] || COLORS.purple;
        const pct = topPanels.length === 1 ? '50%'
                  : `${Math.round(100 * i / (topPanels.length - 1))}%`;
        return `${c.hex[0]}88 ${pct}`;
      }).join(', ')
    : '#8B4FC888 50%';

  // 5) Convertir a formato ORG compatible con las funciones de render
  const orgTop = topPanels.map(p => {
    const c = COLORS[p.color] || COLORS.purple;
    return {
      panelClass: c.panel,
      dropClass:  `col-drop col-drop--${p.color}`,
      leader:     p.leader || { id: p.id, fallback: p.titulo.substring(0,2).toUpperCase(), color: c.av },
      leaderLabel: p.titulo,
      direct:     p.direct,
      subs:       p.subs,
      bridgeAfter: p.bridgeAfter,
    };
  });

  const orgRight = rightPanels.map(p => ({
    panelClass: (COLORS[p.color] || COLORS.yellow).panel,
    title:   p.titulo,
    members: p.direct,
  }));

  const orgBottom = bottomPanels.map(p => ({
    panelClass:  (COLORS[p.color] || COLORS.lavender).panel,
    title:       p.titulo,
    members:     p.direct,
    bridgeAfter: p.bridgeAfter,
  }));

  return { top: orgTop, rightPanels: orgRight, bottom: orgBottom,
           rootPanelIndex: rootIdx, rootPersona: rootInfo?.member,
           topGradient };
}

// ════════════════════════════════════════════════════════════════════════
//  HELPERS DE RENDER
// ════════════════════════════════════════════════════════════════════════
let DATA = {};

function getName(id, fallback) {
  return (DATA[id] && DATA[id].nombre) ? DATA[id].nombre : fallback;
}

function imgTag(id, fallback) {
  const entry = DATA[id];
  const icono = entry && entry.icono ? entry.icono.trim() : '';
  if (icono) {
    const fb = fallback.replace(/'/g, '');
    return `<img src="iconos/${icono}" alt="${fb}"
      onerror="this.style.display='none';this.parentElement.innerHTML='${fb}'"/>`;
  }
  return fallback;
}

function memberHTML(m) {
  return `
    <div class="member">
      <div class="member-avatar ${m.color}">${imgTag(m.id, m.fallback)}</div>
      <div class="member-name">${getName(m.id, m.id)}</div>
    </div>`;
}

function bridgeMemberHTML(m) {
  const styleAttr = m.style  ? ` style="${m.style}"` : '';
  const classAttr = m.colorClass
    ? `class="bridge-avatar ${m.colorClass}"`
    : 'class="bridge-avatar"';
  return `
    <div class="bridge-member" style="color:#ffffff88">
      <div ${classAttr}${styleAttr}>${imgTag(m.id, m.fallback)}</div>
      <div class="bridge-name">${getName(m.id, m.id)}</div>
      <div class="bridge-label">↔ ambas líneas</div>
    </div>`;
}

function subPanelHTML(sp) {
  const colorKey  = sp.color || 'yellow';
  const leaderBlock = sp.leader ? `
    <div class="sub-leader">
      <div class="sub-leader-avatar ${sp.leader.color}">${imgTag(sp.leader.id, sp.leader.fallback)}</div>
      <div class="sub-leader-name">${getName(sp.leader.id, sp.title)}</div>
    </div>` : '';
  return `
    <div class="sub-panel sub-panel--${colorKey}">
      <div class="panel-title">${sp.title}</div>
      ${leaderBlock}
      <div class="member-grid">${sp.members.map(memberHTML).join('')}</div>
    </div>`;
}

// isRoot=true → omite el avatar del líder (ya está en tree-root)
function topPanelHTML(p, delay, isRoot = false) {
  const lName = getName(p.leader.id, p.leaderLabel);
  const leaderBlock = isRoot ? '' : `
    <div class="leader">
      <div class="leader-avatar ${p.leader.color}">${imgTag(p.leader.id, p.leader.fallback)}</div>
      <div class="leader-name">${lName}</div>
    </div>`;
  return `
    <div class="panel ${p.panelClass}" style="animation-delay:${delay}s">
      ${leaderBlock}
      ${p.direct.length ? `
        <div class="member-grid" style="margin-bottom:${p.subs.length?16:0}px">
          ${p.direct.map(memberHTML).join('')}
        </div>` : ''}
      ${p.subs.map(subPanelHTML).join('')}
    </div>`;
}

function simplePanelHTML(p, delay) {
  return `
    <div class="panel ${p.panelClass}" style="animation-delay:${delay}s">
      <div class="panel-title">${p.title}</div>
      <div class="member-grid">${p.members.map(memberHTML).join('')}</div>
    </div>`;
}

function rightColumnHTML(ORG) {
  return `<div class="right-column">
    ${ORG.rightPanels.map((p, i) => simplePanelHTML(p, .24 + i * .08)).join('')}
  </div>`;
}

function bottomSectionHTML(ORG) {
  const panels = ORG.bottom;
  const n = panels.length;

  const panelCells = panels.map((p, i) =>
    `<div class="panel ${p.panelClass}"
       style="grid-row:1;grid-column:${i+1};animation-delay:${.3+i*.07}s">
      <div class="panel-title">${p.title}</div>
      <div class="member-grid">${p.members.map(memberHTML).join('')}</div>
    </div>`
  ).join('');

  let bridgeCells = '';
  panels.forEach((p, i) => {
    if (p.bridgeAfter && p.bridgeAfter.length) {
      bridgeCells += `
        <div class="bridge-strip" style="grid-column:${i+1}/${i+3}">
          ${p.bridgeAfter.map(bridgeMemberHTML).join('')}
        </div>`;
    }
  });

  return `<div class="bottom-grid" style="grid-template-columns:repeat(${n},1fr)">
    ${panelCells}${bridgeCells}
  </div>`;
}

// ════════════════════════════════════════════════════════════════════════
//  RENDER PRINCIPAL
// ════════════════════════════════════════════════════════════════════════
function renderChart(ORG) {
  const rootIdx     = ORG.rootPanelIndex ?? 1;
  const root        = ORG.top[rootIdx] || ORG.top[0];
  const rootPersona = ORG.rootPersona || root?.leader;
  if (!root || !rootPersona) {
    document.getElementById('loading').textContent = 'No se encontraron paneles en el CSV.';
    return;
  }

  const rootName = getName(rootPersona.id, root.leaderLabel);
  const rootImg  = imgTag(rootPersona.id, rootPersona.fallback);

  const rootHTML = `
    <div class="tree-root" style="animation:fadeUp .4s ease both">
      <div class="root-avatar ${rootPersona.color}">${rootImg}</div>
      <div class="root-name">${rootName}</div>
    </div>`;

  // Columnas del panel superior + bridge strips
  const colsHTML = ORG.top.map((p, i) => `
    <div class="panel-col-wrap" style="grid-row:1;grid-column:${i+1}">
      <div class="${p.dropClass}"></div>
      ${topPanelHTML(p, .1 + i * .07, i === rootIdx)}
    </div>`
  ).join('');

  let topBridgeCells = '';
  ORG.top.forEach((p, i) => {
    if (p.bridgeAfter && p.bridgeAfter.length) {
      topBridgeCells += `
        <div class="bridge-strip" style="grid-row:2;grid-column:${i+1}/${i+3}">
          ${p.bridgeAfter.map(bridgeMemberHTML).join('')}
        </div>`;
    }
  });

  const n = ORG.top.length;
  document.getElementById('chart').innerHTML = `
    <p class="section-label">Vertientes principales</p>
    ${rootHTML}
    <div class="top-section">
      <div class="top-main-grid"
           style="grid-template-columns:repeat(${n},1fr)">
        ${colsHTML}${topBridgeCells}
      </div>
      ${rightColumnHTML(ORG)}
    </div>
    <div class="divider"><hr/><span class="divider-label">Sectores adyacentes</span><hr/></div>
    ${bottomSectionHTML(ORG)}
    <p class="tip">LLA · Vertientes Tuiteras · Mapa de facciones</p>
  `;

  // Gradiente del conector horizontal (inyectado inline para ser dinámico)
  const grid = document.querySelector('.top-main-grid');
  if (grid && ORG.topGradient) {
    // Ajustar left/right según número de columnas
    const pct = Math.round(50 / n);
    grid.style.setProperty('--connector-gradient', `linear-gradient(to right,${ORG.topGradient})`);
    // Inyectar via ::before usando una hoja de estilos dinámica
    let styleTag = document.getElementById('dyn-style');
    if (!styleTag) { styleTag = document.createElement('style'); styleTag.id='dyn-style'; document.head.appendChild(styleTag); }
    styleTag.textContent = `.top-main-grid::before{background:linear-gradient(to right,${ORG.topGradient});left:calc(100%/${n*2});right:calc(100%/${n*2});}`;
  }

  document.getElementById('chart').style.display  = 'block';
  document.getElementById('loading').style.display = 'none';
}

// ════════════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════════════
async function init() {
  let rows = [];
  try {
    const res = await fetch('iconos.csv');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    rows = parseCSVRows(await res.text());

    // Construir DATA (id → {nombre, icono}) para helpers de render
    DATA = {};
    for (const r of rows) {
      if (r.tipo !== 'panel' && r.id) {
        DATA[r.id] = { nombre: r.nombre || '', icono: r.icono || '' };
      }
    }
  } catch (err) {
    console.warn('CSV no cargado:', err.message);
    DATA = {};
    const el = document.getElementById('error-msg');
    el.innerHTML = `⚠️ No se encontró <code>iconos.csv</code> — verificá que esté en la misma carpeta.<br>
      <small style="opacity:.5">${err.message}</small>`;
    el.style.display = 'block';
    document.getElementById('loading').style.display = 'none';
    return;
  }

  const ORG = buildORG(rows);
  if (!ORG) {
    document.getElementById('error-msg').innerHTML =
      `⚠️ El CSV usa el formato antiguo. Actualizá <code>iconos.csv</code> con las columnas de estructura (tipo, panel, es_lider, etc.).`;
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('loading').style.display   = 'none';
    return;
  }

  renderChart(ORG);
}

init();
</script>

</html>
